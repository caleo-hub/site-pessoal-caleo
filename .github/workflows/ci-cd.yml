name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-pessoal-caleo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

  deploy:
    name: Deploy to AWS Amplify
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate deployment variables
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
        run: |
          test -n "$AWS_ROLE_TO_ASSUME"
          test -n "$AWS_REGION"
          test -n "$AMPLIFY_APP_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Start Amplify deployment
        id: deploy
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
        run: |
          job_id="$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"

      - name: Wait for Amplify deployment
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          JOB_ID: ${{ steps.deploy.outputs.job_id }}
        run: |
          while true; do
            status="$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)"
            echo "Amplify job $JOB_ID status: $status"
            case "$status" in
              SUCCEED)
                exit 0
                ;;
              FAILED|CANCELLED)
                exit 1
                ;;
              *)
                sleep 20
                ;;
            esac
          done
